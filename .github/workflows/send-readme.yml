name: Send README Daily

on:
  schedule:
    - cron: '0 3 * * *'   # Runs daily at 9 AM UTC
  workflow_dispatch:      # Optional: manual trigger

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Daily README - Prashant Kumar"
          to: saday_k@rediffmail.com; srikanthtenali@activelifehra.com
          from: prashumintu.kumar7@gmail.com
          body: |
            Please find today's README from the git repo attached.

            Regards,
            Prashant Kumar
          attachments: README.md